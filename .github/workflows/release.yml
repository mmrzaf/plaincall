name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist

          go build \
            -trimpath \
            -ldflags "-s -w" \
            -o "dist/plaincall_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/plaincall

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: plaincall-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/plaincall_*
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest

    needs:
      - build-binaries
      - docker

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release_dist
          pattern: plaincall-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: release_dist
        run: |
          set -euo pipefail

          test -f plaincall_linux_amd64
          test -f plaincall_linux_arm64
          test -f plaincall_darwin_amd64
          test -f plaincall_darwin_arm64
          test -f plaincall_windows_amd64.exe

          sha256sum plaincall_* > SHA256SUMS

          echo "Release assets:"
          ls -lah

          echo
          echo "Checksums:"
          cat SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            Docker image:

            `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}`
          files: |
            release_dist/plaincall_linux_amd64
            release_dist/plaincall_linux_arm64
            release_dist/plaincall_darwin_amd64
            release_dist/plaincall_darwin_arm64
            release_dist/plaincall_windows_amd64.exe
            release_dist/SHA256SUMS
